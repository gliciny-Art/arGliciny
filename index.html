<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Stickers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0d;
      --paper: #f5f0e8;
      --accent: #c8392b;
      --muted: #8c8278;
      --border: #e0d8cc;
      --card: #fdfaf4;
    }

    html, body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,57,43,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,57,43,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
      margin: 0 auto 40px;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 16px var(--accent); }
      50% { opacity:0.5; transform:scale(0.7); box-shadow: 0 0 6px var(--accent); }
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.0;
      margin-bottom: 20px;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(11px, 2vw, 13px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 56px;
      max-width: 340px;
    }

    /* ── Collections grid ── */
    .collections {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 760px;
      margin-bottom: 48px;
    }

    .col-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      text-decoration: none;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .col-card::after {
      content: '→';
      position: absolute;
      bottom: 20px; right: 20px;
      font-size: 18px; color: var(--border);
      transition: color 0.2s, transform 0.2s;
    }
    .col-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      border-color: var(--accent);
    }
    .col-card:hover::after {
      color: var(--accent);
      transform: translateX(3px);
    }

    .col-card .col-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .col-card .col-name {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .col-card .col-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .col-card .col-count {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--card) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Footer links ── */
    .footer-links {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .footer-link:hover {
      color: var(--ink);
      border-color: var(--ink);
    }
    .footer-link.admin { color: var(--accent); }
    .footer-link.admin:hover { border-color: var(--accent); }

    /* Error message */
    .error-msg {
      font-size: 12px; color: var(--muted);
      text-align: center; padding: 40px;
    }

    @media (max-width: 500px) {
      .collections { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="dot"></div>

  <h1>AR<br><em>Stickers</em></h1>
  <p class="subtitle">Escanea el QR de tu sticker<br>y cobra vida</p>

  <div class="collections" id="collections-grid">
    <!-- Skeletons while loading -->
    <div class="col-card" style="pointer-events:none">
      <div class="skeleton" style="width:60px"></div>
      <div class="skeleton" style="width:140px;height:20px"></div>
      <div class="skeleton" style="width:100%;height:11px"></div>
    </div>
  </div>

  <div class="footer-links">
    <a class="footer-link admin" href="admin/">⚙ Admin</a>
    <a class="footer-link" href="ar/">▶ Abrir cámara AR</a>
  </div>
</section>

<script>
  async function loadCollections() {
    const grid = document.getElementById('collections-grid');
    try {
      const res = await fetch('collections.json');
      const data = await res.json();
      const activas = data.colecciones.filter(c => c.activa);

      if (activas.length === 0) {
        grid.innerHTML = '<p class="error-msg">Aún no hay colecciones activas.<br>Ve al panel admin para crear una.</p>';
        return;
      }

      grid.innerHTML = activas.map(col => `
        <a class="col-card" href="ar/index.html?c=${col.id}">
          <span class="col-label">Colección</span>
          <span class="col-name">${col.nombre}</span>
          ${col.descripcion ? `<span class="col-desc">${col.descripcion}</span>` : ''}
          <span class="col-count">${(col.stickers||[]).length} sticker${(col.stickers||[]).length !== 1 ? 's' : ''}</span>
        </a>
      `).join('');

    } catch(e) {
      grid.innerHTML = '<p class="error-msg">No se pudieron cargar las colecciones.</p>';
    }
  }

  loadCollections();
</script>

</body>
</html>
