<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AR Frieren</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
    #ui { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 28px 20px 40px; }
    .top { display: flex; align-items: center; justify-content: space-between; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3d2e; box-shadow: 0 0 10px #ff3d2e; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .badge { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; }
    .frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(240px, 60vw); aspect-ratio: 1; }
    .c { position: absolute; width: 20px; height: 20px; border-color: rgba(255,255,255,0.5); border-style: solid; }
    .tl{top:0;left:0;border-width:2px 0 0 2px} .tr{top:0;right:0;border-width:2px 2px 0 0} .bl{bottom:0;left:0;border-width:0 0 2px 2px} .br{bottom:0;right:0;border-width:0 2px 2px 0}
    .hint { position: absolute; bottom: -32px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }
    .bottom { text-align: center; color: rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>

<div id="ui">
  <div class="top">
    <div class="dot"></div>
    <div class="badge">Frieren</div>
  </div>
  <div class="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="hint">Apunta al sticker</div>
  </div>
  <div class="bottom">Mantén el sticker visible</div>
</div>

<a-scene
  mindar-image="imageTargetSrc: https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <img id="gif0" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-01.gif" crossorigin="anonymous">
    <img id="gif1" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-02.gif" crossorigin="anonymous">
    <img id="gif2" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-03.gif" crossorigin="anonymous">
    <img id="gif3" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-04.gif" crossorigin="anonymous">
    <img id="gif4" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-05.gif" crossorigin="anonymous">
    <img id="gif5" src="https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/sticker-06.gif" crossorigin="anonymous">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane src="#gif0" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 1">
    <a-plane src="#gif1" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 2">
    <a-plane src="#gif2" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 3">
    <a-plane src="#gif3" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 4">
    <a-plane src="#gif4" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 5">
    <a-plane src="#gif5" width="1" height="1" position="0 0 0" material="transparent:true;alphaTest:0.05;side:double"></a-plane>
  </a-entity>

</a-scene>

</body>
</html>
