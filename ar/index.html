<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR Frieren</title>

  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d0d0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px; text-align: center;
    }
    #splash h2 { color: #fff; font-size: 22px; font-family: system-ui; font-weight: 300; }
    #splash p { color: rgba(255,255,255,0.45); font-size: 13px; line-height: 1.7; font-family: system-ui; max-width: 280px; }
    #splash button {
      padding: 14px 32px; background: #ff3d2e; border: none;
      border-radius: 10px; color: #fff; font-size: 14px;
      font-family: system-ui; cursor: pointer; margin-top: 8px;
      letter-spacing: 0.05em;
    }
    #splash.hidden { display: none; }

    #loading {
      position: fixed; inset: 0; z-index: 9998;
      background: #0d0d0d;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #loading.show { display: flex; }
    .ring { width: 52px; height: 52px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #ff3d2e; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-family: system-ui; }

    #ui { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: none; flex-direction: column; justify-content: space-between; padding: 28px 20px 40px; }
    #ui.show { display: flex; }
    .top { display: flex; align-items: center; justify-content: space-between; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3d2e; box-shadow: 0 0 10px #ff3d2e; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .badge { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 11px; font-family: system-ui; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; }
    .frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: min(240px,60vw); aspect-ratio: 1; }
    .c { position: absolute; width: 20px; height: 20px; border-color: rgba(255,255,255,0.5); border-style: solid; }
    .tl{top:0;left:0;border-width:2px 0 0 2px} .tr{top:0;right:0;border-width:2px 2px 0 0} .bl{bottom:0;left:0;border-width:0 0 2px 2px} .br{bottom:0;right:0;border-width:0 2px 2px 0}
    .hint { position: absolute; bottom:-32px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.35); font-size:10px; font-family:system-ui; letter-spacing:0.14em; text-transform:uppercase; white-space:nowrap; }
    .bottom { text-align:center; color:rgba(255,255,255,0.2); font-size:10px; font-family:system-ui; letter-spacing:0.15em; text-transform:uppercase; }

    #toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px); z-index:200; pointer-events:none; background:rgba(0,0,0,0.8); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.1); color:#fff; font-size:12px; font-family:system-ui; padding:10px 22px; border-radius:100px; opacity:0; transition:opacity 0.3s,transform 0.3s; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    a-scene { position:fixed !important; inset:0 !important; width:100% !important; height:100% !important; }
  </style>
</head>
<body>

<!-- Paso 1: pedir permiso explícito antes de iniciar -->
<div id="splash">
  <h2>AR Frieren ✦</h2>
  <p>Necesitamos acceso a tu cámara para mostrar la experiencia AR sobre tus stickers.</p>
  <button onclick="startAR()">Activar cámara AR</button>
</div>

<!-- Cargando -->
<div id="loading"><div class="ring"></div><p>Cargando experiencia…</p></div>

<!-- UI -->
<div id="ui">
  <div class="top"><div class="dot"></div><div class="badge">Frieren</div></div>
  <div class="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="hint">Apunta al sticker</div>
  </div>
  <div class="bottom">Mantén el sticker visible</div>
</div>

<div id="toast"></div>

<script>
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

async function startAR() {
  // Pedir permiso de cámara explícitamente primero
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop()); // solo para pedir permiso
  } catch(e) {
    alert('No se pudo acceder a la cámara: ' + e.message);
    return;
  }

  document.getElementById('splash').classList.add('hidden');
  document.getElementById('loading').classList.add('show');

  // Insertar escena después del permiso
  const scene = document.createElement('a-scene');
  scene.setAttribute('mindar-image', 'imageTargetSrc: https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;');
  scene.setAttribute('color-space', 'sRGB');
  scene.setAttribute('renderer', 'colorManagement: true');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

  const assets = document.createElement('a-assets');
  assets.setAttribute('timeout', '60000');

  const gifs = [
    'sticker-01.gif','sticker-02.gif','sticker-03.gif',
    'sticker-04.gif','sticker-05.gif','sticker-06.gif'
  ];
  const base = 'https://gliciny-art.github.io/arGliciny/assets/collections/frieren1/gifs/';
  const names = ['Sticker 1','Sticker 2','Sticker 3','Sticker 4','Sticker 5','Sticker 6'];

  gifs.forEach((g, i) => {
    const img = document.createElement('img');
    img.id = 'gif' + i;
    img.src = base + g;
    img.crossOrigin = 'anonymous';
    assets.appendChild(img);
  });
  scene.appendChild(assets);

  const cam = document.createElement('a-camera');
  cam.setAttribute('position', '0 0 0');
  cam.setAttribute('look-controls', 'enabled: false');
  scene.appendChild(cam);

  gifs.forEach((_, i) => {
    const entity = document.createElement('a-entity');
    entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
    entity.id = 'target' + i;

    const plane = document.createElement('a-plane');
    plane.setAttribute('src', '#gif' + i);
    plane.setAttribute('width', '1');
    plane.setAttribute('height', '1');
    plane.setAttribute('position', '0 0 0');
    plane.setAttribute('material', 'transparent: true; alphaTest: 0.05; side: double');

    entity.appendChild(plane);
    scene.appendChild(entity);
  });

  document.body.appendChild(scene);

  scene.addEventListener('arReady', () => {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('ui').classList.add('show');

    gifs.forEach((_, i) => {
      const t = document.getElementById('target' + i);
      if (t) t.addEventListener('targetFound', () => toast('✦ ' + names[i]));
    });
  });

  scene.addEventListener('arError', (e) => {
    document.getElementById('loading').innerHTML =
      '<p style="color:#ff3d2e;padding:40px;text-align:center;font-family:system-ui;line-height:1.8">Error iniciando AR.<br>Recarga e intenta de nuevo.</p>';
    console.error(e);
  });

  setTimeout(() => {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('ui').classList.add('show');
  }, 25000);
}
</script>
</body>
</html>
