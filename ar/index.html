<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AR Stickers</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&display=swap');

    :root {
      --ink: #0d0d0d;
      --paper: #faf7f2;
      --accent: #ff3d2e;
      --glass: rgba(250,247,242,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 64px; height: 64px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      color: rgba(255,255,255,0.5);
      font-size: 13px; letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── A-Frame canvas ── */
    #ar-scene {
      position: fixed; inset: 0;
      width: 100% !important; height: 100% !important;
    }

    /* ── UI overlay ── */
    #ui {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 24px 20px 36px;
    }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.7); }
    }
    .collection-badge {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px; border-radius: 100px;
    }

    /* Viewfinder hint */
    .viewfinder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(260px, 65vw);
      aspect-ratio: 1;
    }
    .vf-corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(255,255,255,0.6);
      border-style: solid;
    }
    .vf-corner.tl { top:0; left:0; border-width: 2px 0 0 2px; }
    .vf-corner.tr { top:0; right:0; border-width: 2px 2px 0 0; }
    .vf-corner.bl { bottom:0; left:0; border-width: 0 0 2px 2px; }
    .vf-corner.br { bottom:0; right:0; border-width: 0 2px 2px 0; }

    .scan-hint {
      position: absolute;
      bottom: -36px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 2px; right: 2px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 2.4s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes scan {
      0% { top: 0; opacity:0; }
      10% { opacity:1; }
      90% { opacity:1; }
      100% { top: 100%; opacity:0; }
    }

    /* Found indicator */
    #found-indicator {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      z-index: 30; pointer-events: none;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px 28px;
      color: #fff;
      font-size: 13px; letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
    }
    #found-indicator.show {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
    }

    /* Bottom hint */
    .bottom-hint {
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Error screen */
    #error-screen {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: var(--ink);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px;
      text-align: center;
    }
    #error-screen.show { display: flex; }
    #error-screen h2 { color: var(--accent); font-size: 22px; font-weight: 500; }
    #error-screen p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; }
    #error-screen a {
      margin-top: 8px;
      color: var(--paper);
      font-size: 12px; letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <p>Iniciando cámara AR…</p>
</div>

<!-- Error -->
<div id="error-screen">
  <h2>Cámara no disponible</h2>
  <p>Necesitamos acceso a tu cámara para mostrar la experiencia AR. Por favor permite el acceso y recarga la página.</p>
  <a href="javascript:location.reload()">Reintentar</a>
</div>

<!-- UI overlay -->
<div id="ui">
  <div class="top-bar">
    <div class="logo-dot"></div>
    <div class="collection-badge" id="collection-name">AR Stickers</div>
  </div>

  <div class="viewfinder">
    <div class="vf-corner tl"></div>
    <div class="vf-corner tr"></div>
    <div class="vf-corner bl"></div>
    <div class="vf-corner br"></div>
    <div class="scan-line"></div>
    <div class="scan-hint">Apunta al sticker</div>
  </div>

  <div class="bottom-hint">Mantén el sticker visible</div>
</div>

<!-- Found indicator -->
<div id="found-indicator">✦ Sticker encontrado</div>

<!-- A-Frame scene (built dynamically) -->
<div id="ar-scene-container"></div>

<script>
  // ── Helpers ──────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const collectionId = params.get('c') || null;

  let foundTimer;

  function showFound(name) {
    const el = $('found-indicator');
    el.textContent = `✦ ${name || 'Sticker encontrado'}`;
    el.classList.add('show');
    clearTimeout(foundTimer);
    foundTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── Load config & build scene ─────────────────────────
  async function init() {
    let config;
    try {
      const res = await fetch('../collections.json');
      config = await res.json();
    } catch(e) {
      showError('No se pudo cargar la configuración.');
      return;
    }

    // Pick collection
    const colecciones = config.colecciones.filter(c => c.activa);
    const col = collectionId
      ? colecciones.find(c => c.id === collectionId)
      : colecciones[0];

    if (!col) { showError('Colección no encontrada.'); return; }

    $('collection-name').textContent = col.nombre;

    const stickers = col.stickers;
    if (!stickers || stickers.length === 0) {
      showError('Esta colección no tiene stickers configurados.');
      return;
    }

    buildScene(stickers, col);
  }

  function showError(msg) {
    $('loading').classList.add('hidden');
    const es = $('error-screen');
    es.querySelector('p').textContent = msg;
    es.classList.add('show');
  }

  // ── Build A-Frame scene dynamically ──────────────────
  function buildScene(stickers, col) {
    // MindAR needs all targets in one .mind file per scene
    const mindSrc = col.mindFile || stickers[0].imagen_marcador
      .replace(/\/marcadores\/.*$/, '/targets.mind');

    const container = $('ar-scene-container');

    const scene = document.createElement('a-scene');
    scene.setAttribute('mindar-image', `imageTargetSrc: ../${mindSrc}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;`);
    scene.setAttribute('color-space', 'sRGB');
    scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights: true');
    scene.setAttribute('vr-mode-ui', 'enabled: false');
    scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
    scene.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;';

    // Assets
    const assets = document.createElement('a-assets');
    stickers.forEach((s, i) => {
      const img = document.createElement('img');
      img.id = `gif-${i}`;
      img.src = `../${s.animacion}`;
      assets.appendChild(img);
    });
    scene.appendChild(assets);

    // Camera
    const cam = document.createElement('a-camera');
    cam.setAttribute('position', '0 0 0');
    cam.setAttribute('look-controls', 'enabled: false');
    scene.appendChild(cam);

    // Targets
    stickers.forEach((s, i) => {
      const target = document.createElement('a-entity');
      target.setAttribute('mindar-image-target', `targetIndex: ${i}`);

      const plane = document.createElement('a-plane');
      plane.setAttribute('src', `#gif-${i}`);
      plane.setAttribute('position', '0 0 0');
      plane.setAttribute('height', `${s.escala || 1}`);
      plane.setAttribute('width', `${s.escala || 1}`);
      plane.setAttribute('rotation', '0 0 0');
      plane.setAttribute('material', 'transparent: true; alphaTest: 0.1;');

      target.appendChild(plane);

      // Events
      target.addEventListener('targetFound', () => showFound(s.nombre));

      scene.appendChild(target);
    });

    // Scene ready → hide loading
    scene.addEventListener('arReady', () => {
      $('loading').classList.add('hidden');
    });
    scene.addEventListener('arError', () => {
      showError('No se pudo acceder a la cámara. Permite el permiso e intenta de nuevo.');
    });

    container.appendChild(scene);

    // Fallback timeout
    setTimeout(() => {
      if (!$('loading').classList.contains('hidden')) {
        $('loading').classList.add('hidden');
      }
    }, 8000);
  }

  init();
</script>
</body>
</html>
